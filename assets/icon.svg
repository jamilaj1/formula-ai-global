<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0e27"/>
      <stop offset="100%" stop-color="#050818"/>
    </linearGradient>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00ff88"/>
      <stop offset="100%" stop-color="#00d4ff"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#00ff88" stop-opacity="0.55"/>
      <stop offset="60%" stop-color="#00d4ff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#00ff88" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Rounded background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Pulsing aura behind the nucleus -->
  <circle cx="256" cy="256" r="80" fill="url(#glow)">
    <animate attributeName="r" values="60;130;60" dur="3.2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.35;0.85;0.35" dur="3.2s" repeatCount="indefinite"/>
  </circle>

  <!-- Orbital paths (gentle counter-rotation creates a shimmer) -->
  <g fill="none" stroke="url(#grad)" stroke-width="14" stroke-linecap="round">
    <ellipse cx="256" cy="256" rx="180" ry="70">
      <animateTransform attributeName="transform" type="rotate"
        from="0 256 256" to="360 256 256" dur="22s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="256" cy="256" rx="180" ry="70" transform="rotate(60 256 256)">
      <animateTransform attributeName="transform" type="rotate"
        from="60 256 256" to="-300 256 256" dur="26s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="256" cy="256" rx="180" ry="70" transform="rotate(-60 256 256)">
      <animateTransform attributeName="transform" type="rotate"
        from="-60 256 256" to="300 256 256" dur="30s" repeatCount="indefinite"/>
    </ellipse>
  </g>

  <!-- Nucleus that breathes -->
  <circle cx="256" cy="256" r="24" fill="url(#grad)">
    <animate attributeName="r" values="22;30;22" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.95;1;0.95" dur="2s" repeatCount="indefinite"/>
  </circle>

  <!-- Electrons orbiting around the nucleus -->
  <g>
    <animateTransform attributeName="transform" type="rotate"
      from="0 256 256" to="360 256 256" dur="7s" repeatCount="indefinite"/>
    <circle cx="256" cy="86" r="14" fill="#00ff88">
      <animate attributeName="r" values="12;16;12" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="146" cy="306" r="14" fill="#00d4ff">
      <animate attributeName="r" values="12;16;12" dur="1.5s" begin="0.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="366" cy="306" r="14" fill="#c084fc">
      <animate attributeName="r" values="12;16;12" dur="1.5s" begin="1s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
