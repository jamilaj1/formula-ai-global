name: Daily paper scrape

# Runs Phase 5 daily learning loop:
#   1. Fetch new chemistry papers from arXiv + Europe PMC
#   2. Claude extracts any formulations
#   3. Inserts into formulas table with trust_score 60-75
#
# Free to run on GitHub Actions (default schedule = once daily UTC).

on:
  schedule:
    - cron: '17 3 * * *'   # 03:17 UTC daily — off-peak for both APIs
  workflow_dispatch:        # allow manual triggering

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies (without RDKit/heavy deps)
        run: |
          python -m pip install --upgrade pip
          # The scraper only needs httpx + python-dotenv. We skip rdkit/
          # supabase-py/etc to keep the runner lean.
          pip install httpx python-dotenv

      - name: Run paper scrape
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: claude-haiku-4-5
        run: |
          cd backend
          python -m cron.daily_paper_scrape

  health-report:
    needs: scrape
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install httpx python-dotenv
      - name: Post daily health report
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          HEALTH_REPORT_WEBHOOK: ${{ secrets.HEALTH_REPORT_WEBHOOK }}
        run: |
          cd backend
          python -m cron.daily_health_report
