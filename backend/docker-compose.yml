# =============================================================================
# Formula AI Global — local + production stack
# Run: docker compose up --build
# =============================================================================

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: formula-ai/api:latest
    container_name: formula-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - formula-net

  # Streamlit alternative UI (optional — keep commented if using static HTML site)
  ui:
    image: python:3.11-slim
    container_name: formula-ui
    working_dir: /app
    command: >
      bash -c "pip install --no-cache-dir streamlit==1.40.0 requests==2.32.0 python-jose==3.3.0
      && streamlit run streamlit_app.py
        --server.port=8501
        --server.address=0.0.0.0
        --server.headless=true
        --browser.gatherUsageStats=false"
    ports:
      - "8501:8501"
    volumes:
      - ./streamlit_app.py:/app/streamlit_app.py
      - ./.env:/app/.env
    environment:
      - API_URL=http://api:8000
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    profiles: ["streamlit"]   # only start with: docker compose --profile streamlit up
    networks:
      - formula-net

  # Redis cache for AI responses + rate limiting
  redis:
    image: redis:7-alpine
    container_name: formula-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - formula-net

  # Nginx reverse proxy (production only)
  nginx:
    image: nginx:alpine
    container_name: formula-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
      - ../outputs:/usr/share/nginx/html:ro    # serve the static HTML site
    depends_on:
      - api
    restart: unless-stopped
    profiles: ["production"]
    networks:
      - formula-net

volumes:
  redis_data:

networks:
  formula-net:
    driver: bridge
